name: signozpoc

services:
  postgres:
    image: docker.io/library/postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-reservations}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-reservations}
      POSTGRES_DB: ${POSTGRES_DB:-reservations}
    ports:
      # Bind to loopback only — do not expose DB to the LAN with default creds.
      - "127.0.0.1:5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./postgres/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
      - ./logs/postgres:/var/log/postgres
    command:
      - postgres
      - -c
      - logging_collector=on
      - -c
      - log_directory=/var/log/postgres
      - -c
      - log_filename=postgresql.log
      - -c
      - log_statement=mod
      - -c
      - log_destination=stderr
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-reservations} -d ${POSTGRES_DB:-reservations}"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks: [app]

  garage:
    image: docker.io/dxflrs/garage:v2.0.0
    environment:
      GARAGE_ADMIN_TOKEN: ${GARAGE_ADMIN_TOKEN:?run 'just setup' first}
    ports:
      - "127.0.0.1:3900:3900"
      - "127.0.0.1:3902:3902"
    volumes:
      - ./garage/garage.toml:/etc/garage.toml:ro
      - garage_meta:/var/lib/garage/meta
      - garage_data:/var/lib/garage/data
    restart: unless-stopped
    networks: [app]

  otel-collector:
    image: docker.io/otel/opentelemetry-collector-contrib:0.129.1
    # Postgres/Caddy create log files with restrictive ownership. The files are
    # mounted read-only, and this is only used to let filelog read them.
    user: "0"
    command: ["--config=/etc/otelcol/config.yaml"]
    environment:
      SIGNOZ_OTLP_ENDPOINT: ${SIGNOZ_GATEWAY_OTLP_ENDPOINT:-signoz-ingester:4317}
      POSTGRES_USER: ${POSTGRES_USER:-reservations}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-reservations}
      POSTGRES_DB: ${POSTGRES_DB:-reservations}
    ports:
      - "127.0.0.1:14317:4317"
      - "127.0.0.1:14318:4318"
    volumes:
      - ./otel/otel-collector-config.yaml:/etc/otelcol/config.yaml:ro
      - ./logs/caddy:/var/log/caddy:ro
      - ./logs/postgres:/var/log/postgres:ro
    depends_on:
      postgres:
        condition: service_healthy
      garage:
        condition: service_started
    networks: [app, signoz]

  backend:
    build:
      context: ../backend
      dockerfile: Dockerfile
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER:-reservations}:${POSTGRES_PASSWORD:-reservations}@postgres:5432/${POSTGRES_DB:-reservations}
      PASSWORD_PEPPER: ${PASSWORD_PEPPER:-change-me-to-a-long-random-pepper-value}
      COOKIE_SECURE: ${COOKIE_SECURE:-false}
      GARAGE_ENDPOINT: http://garage:3900
      GARAGE_REGION: garage
      GARAGE_ACCESS_KEY: ${GARAGE_ACCESS_KEY:-GK1234567890abcdef}
      GARAGE_SECRET_KEY: ${GARAGE_SECRET_KEY:-abcdefghijklmnopqrstuvwxyz0123456789ABCDEF}
      GARAGE_BUCKET: ${GARAGE_BUCKET:-equipment-images}
      OTEL_EXPORTER_OTLP_ENDPOINT: http://otel-collector:4317
      OTEL_SERVICE_NAME: equipment-reservation-api
      BIND_ADDR: 0.0.0.0:3000
      FRONTEND_ORIGIN: ${FRONTEND_ORIGIN:-http://localhost}
      TRUSTED_PROXIES: ${TRUSTED_PROXIES:-172.30.0.0/24}
      RUST_LOG: ${RUST_LOG:-info,equipment_reservation=debug}
    ports:
      # Prefer Caddy (:8088) as the public entry; API is loopback-only.
      - "127.0.0.1:3000:3000"
    depends_on:
      postgres:
        condition: service_healthy
      otel-collector:
        condition: service_started
      garage:
        condition: service_started
    networks:
      app: {}
      proxy:
        aliases: [backend-proxy]

  frontend:
    build:
      context: ../frontend
      dockerfile: Dockerfile
    environment:
      VITE_API_BASE_URL: ""
      VITE_OTEL_ENDPOINT: http://localhost:14318
    ports:
      - "127.0.0.1:5173:5173"
    depends_on:
      - backend
    networks: [web]

  caddy:
    image: docker.io/library/caddy:2.9-alpine
    ports:
      - "127.0.0.1:8088:80"
    volumes:
      - ./caddy/Caddyfile:/etc/caddy/Caddyfile:ro
      - ./logs/caddy:/var/log/caddy
      - caddy_data:/data
    environment:
      OTEL_EXPORTER_OTLP_ENDPOINT: otel-collector:4317
      OTEL_EXPORTER_OTLP_INSECURE: "true"
      OTEL_SERVICE_NAME: caddy
    depends_on:
      - backend
      - frontend
    networks: [app, proxy, web]

  # Run explicitly with `just dashboard-sync`.  The checked-in definition and
  # script are mounted read-only; only the SigNoz dashboard record is mutated.
  dashboard-provisioner:
    image: docker.io/curlimages/curl:8.12.1
    profiles: [dashboard]
    network_mode: host
    environment:
      SIGNOZ_API_KEY: ${SIGNOZ_API_KEY:?create an Editor SigNoz API key in .env first}
      SIGNOZ_ENDPOINT: ${SIGNOZ_ENDPOINT:-http://127.0.0.1:8080}
    volumes:
      - ./signoz/dashboards:/dashboards:ro
      - ./signoz/provision-dashboard.sh:/provision-dashboard.sh:ro
    entrypoint: ["/bin/sh", "/provision-dashboard.sh"]

volumes:
  postgres_data:
  garage_meta:
  garage_data:
  caddy_data:

networks:
  app:
    internal: true
  proxy:
    internal: true
    ipam:
      config:
        - subnet: 172.30.0.0/24
  web:
    internal: true
  # Created by Foundry's `just obs-up`; the collector sends directly to its
  # ingester instead of trying to cross the Podman machine host boundary.
  signoz:
    external: true
    name: signoz-network
